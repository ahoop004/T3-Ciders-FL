data_config:
  dataset_path: "./Data/Imagenette"
  dataset_name: "Imagenette"
  non_iid_per: 0
  eval_subset: "attack_eval"
  validation_split:
    enabled: true
    seed: 42
    selection_fraction: 0.5

global_config:
  seed: 42
  device: "cuda"

module4_handoff:
  enabled: true
  artifacts_dir: "../4_Adversarial_FL/artifacts"
  target_checkpoint: "module4_v3_target.pt"
  surrogate_checkpoint: "module4_surrogate.pt"

artifacts:
  dir: "artifacts"
  config_snapshot: "module5_defense_sweeps_config_used.json"

stage:
  name: "defense_sweeps"
  notebook: "defense_sweeps.ipynb"

defense_sweeps:
  run_malicious_fraction_sweep: false
  run_krum_hyperparameter_sweep: false
  run_non_iid_stress: false

model_config:
  module: "model"
  name: "MobileNetV3Transfer"
  kwargs:
    pretrained: false
    num_classes: 10
    dropout: 0.1

algorithms:
  FedAvg:
    fed_config:
      algorithm: "FedAvg"
      fraction_clients: 0.2
      num_clients: 50
      num_rounds: 12
      num_epochs: 3
      batch_size: 64
      global_stepsize: 1.0
      local_stepsize: 0.002
      criterion: "torch.nn.CrossEntropyLoss"
    optim_config: {}

defense:
  name: "trimmed_mean"
  trim_fraction: 0.1

attack:
  seed: 42
  malicious_fraction: 0.1
  malicious_client_selection:
    mode: "seeded_random"
    client_ids: []
  start_round: 3
  attack:
    type: "pgd"
    poison_rate: 0.2
    target_label: 0
    epsilon: 0.03137255
    step_size: 0.00784314
    iters: 20
    criterion: "torch.nn.CrossEntropyLoss"
    poison_rate_schedule:
      type: "linear"
      start: 0.05
      end: 0.2
  surrogate:
    checkpoint: "../4_Adversarial_FL/artifacts/module4_surrogate.pt"
    checkpoint_source: "train_surrogate.ipynb"
    pretrained: false
    finetune_epochs: 0
    local_finetune_epochs: 0
    learning_rate: 0.001
    weight_decay: 0.0
    batch_size: 64
    freeze_backbone: false
    early_stop_patience: 0

experiments:
  defenses:
    - name: "fedavg"
    - name: "clipping"
      clip_norm: 5.0
    - name: "median"
    - name: "trimmed_mean"
      trim_fraction: 0.1
    - name: "krum"
      byzantine_f: 2
  malicious_fraction_sweep: [0.0, 0.05, 0.1, 0.2, 0.3]
  non_iid_sweep: [0.0, 0.5, 0.8]
  non_iid_defenses:
    - name: "fedavg"
    - name: "clipping"
      clip_norm: 5.0
    - name: "trimmed_mean"
      trim_fraction: 0.1
    - name: "krum"
      byzantine_f: 2
  krum_byzantine_f_sweep: [1, 2, 5]
