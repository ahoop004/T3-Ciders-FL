data_config:
  dataset_path: "./Data/Imagenette"
  # Options: "Imagenette" is the supported Module 4 default. The loader can also
  # resolve many torchvision dataset names, but model_config.kwargs.num_classes
  # and transforms may need matching edits.
  dataset_name: "Imagenette"
  # Label-skew severity in [0, 1]. 0 = IID, 1 = very non-IID.
  non_iid_per: 0
  # Options: "selection" for checkpoint selection/early stopping, "attack_eval"
  # for held-out attack evaluation, "all" for the full validation set.
  eval_subset: "selection"
  validation_split:
    enabled: true
    seed: 42
    # Fraction of Imagenette val reserved for checkpoint selection. The
    # remainder is held out for attack evaluation.
    selection_fraction: 0.5

global_config:
  seed: 42
  # Options: "cuda", "cuda:0", "cpu". CUDA choices fall back to CPU if unavailable.
  device: "cuda"

artifacts:
  dir: "artifacts"
  config_snapshot: "module4_target_config_used.json"
  target_metrics: "module4_target_training.json"
  target_checkpoint: "module4_v3_target.pt"
  target_history_plot: "target_training_history.png"

target_training:
  notebook: "train_v3.ipynb"
  # Options: "centralized". Federated clean/attacked runs are handled in the
  # focused attack notebooks.
  mode: "centralized"
  # Options: "quick", "tuned_imagenette", or another key added under target_training_profiles.
  profile: "tuned_imagenette"
  # To override one setting without creating a new profile, add the same key here.
  # Example: batch_size: 128

target_training_profiles:
  quick:
    description: "Fast classroom run for validating the Module 4 handoff artifacts."
    num_epochs: 4
    batch_size: 64
    eval_batch_size: 512
    # Options: true freezes the MobileNetV3 feature extractor; false fine-tunes all trainable layers.
    freeze_backbone: false
    # Options: true enables AMP on CUDA; false uses full precision.
    use_amp: false
    # Options: 0 disables early stopping; positive values stop after this many
    # validation-loss checks without improvement.
    early_stop_patience: 0
    optimizer:
      # Options: "sgd", "local_sgd", "adam", "adamw".
      # LR scale depends on optimizer: SGD/local_sgd can use larger values;
      # Adam/AdamW fine-tuning usually starts around 0.0001-0.0003.
      name: "sgd"
      lr: 0.002
      # Used by SGD/local_sgd only.
      momentum: 0.0
      weight_decay: 0.0
    scheduler:
      # Options: "none", "cosine", "warmup_cosine", "plateau", "reduce_on_plateau".
      name: "none"
    criterion:
      # CrossEntropyLoss label_smoothing; range [0, 1).
      label_smoothing: 0.0

  tuned_imagenette:
    description: "Longer MobileNetV3-Small fine-tuning run; reduce batch size if GPU memory is tight."
    num_epochs: 500
    batch_size: 64
    eval_batch_size: 512
    # Options: true freezes the MobileNetV3 feature extractor; false fine-tunes all trainable layers.
    freeze_backbone: false
    # Options: true enables AMP on CUDA; false uses full precision.
    use_amp: true
    early_stop_patience: 8
    optimizer:
      # Options: "sgd", "local_sgd", "adam", "adamw".
      # LR scale depends on optimizer: SGD/local_sgd can use larger values;
      # Adam/AdamW fine-tuning usually starts around 0.0001-0.0003.
      name: "sgd"
      lr: 0.002
      # Used by SGD/local_sgd only.
      momentum: 0.9
      weight_decay: 0.00004
    scheduler:
      # Options: "none", "cosine", "warmup_cosine", "plateau", "reduce_on_plateau".
      name: "warmup_cosine"
      # Used by warmup_cosine only.
      warmup_epochs: 5
      # Used by cosine and warmup_cosine.
      min_lr: 0.00001
    criterion:
      # CrossEntropyLoss label_smoothing; range [0, 1).
      label_smoothing: 0.0

model_config:
  module: "model"
  # Options for train_v3.ipynb: "MobileNetV3Transfer".
  name: "MobileNetV3Transfer"
  kwargs:
    # Options: true downloads/uses torchvision pretrained weights; false starts randomly.
    pretrained: true
    # Must match dataset_name. Imagenette uses 10 classes.
    num_classes: 10
    dropout: 0.1

algorithms:
  # Used only for fallback defaults in train_v3_config.yaml. Focused attack
  # notebooks own the actual clean/attacked FL run settings.
  FedAvg:
    fed_config:
      num_epochs: 3
      batch_size: 64
      local_stepsize: 0.002
    optim_config: {}
