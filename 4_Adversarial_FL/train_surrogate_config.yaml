data_config:
  dataset_path: "./Data/Imagenette"
  # Options: "Imagenette" is the supported Module 4 default. The loader can also
  # resolve many torchvision dataset names, but model_config.kwargs.num_classes
  # and transforms may need matching edits.
  dataset_name: "Imagenette"
  # Label-skew severity in [0, 1]. 0 = IID, 1 = very non-IID.
  non_iid_per: 0
  # Options: "selection" for checkpoint selection/early stopping, "attack_eval"
  # for held-out attack evaluation, "all" for the full validation set.
  eval_subset: "selection"
  validation_split:
    enabled: true
    seed: 42
    # Fraction of Imagenette val reserved for checkpoint selection. The
    # remainder is held out for attack evaluation.
    selection_fraction: 0.5

global_config:
  seed: 42
  # Options: "cuda", "cuda:0", "cpu". CUDA choices fall back to CPU if unavailable.
  device: "cuda"

artifacts:
  dir: "artifacts"
  config_snapshot: "module4_surrogate_config_used.json"
  surrogate_metrics: "module4_surrogate.json"
  surrogate_checkpoint: "module4_surrogate.pt"
  surrogate_history_plot: "surrogate_history.png"

surrogate_training:
  notebook: "train_surrogate.ipynb"
  # Options: "centralized". A single saved MobileNetV2 surrogate is trained
  # once and reused by the attack notebook.
  mode: "centralized"
  # Options: "quick", "tuned_imagenette", "attacker_pool", or another key
  # added under surrogate_training_profiles.
  profile: "tuned_imagenette"
  # Options: "client_pool" keeps the attacker limited to pooled client shards;
  # "full_train" intentionally gives the surrogate the full training set.
  data_view: "client_pool"
  # Client shard used as the first surrogate data source when data_view=client_pool.
  client_id: 0
  # Number of client shards to pool when data_view=client_pool.
  pool_size: 4
  # To override one setting without creating a new profile, add the same key here.
  # Example: batch_size: 128
  dataset_path: "./Data/Imagenette"
  # Options: keep aligned with data_config.dataset_name unless intentionally
  # training the surrogate on a different dataset.
  dataset_name: "Imagenette"
  # Keep this aligned with data_config.eval_subset for normal runs.
  eval_subset: "selection"
  # Label-skew severity in [0, 1]. Keep aligned with data_config.non_iid_per
  # unless intentionally changing the surrogate threat model.
  non_iid_per: 0

surrogate_training_profiles:
  quick:
    description: "Target-aligned MobileNetV2 surrogate smoke test over the configured attacker data view."
    num_epochs: 4
    batch_size: 64
    eval_batch_size: 512
    # Options: true downloads/uses torchvision pretrained weights; false starts randomly.
    pretrained: true
    # Options: true freezes the MobileNetV2 feature extractor; false fine-tunes all trainable layers.
    freeze_backbone: false
    # Options: true applies light image augmentation; false trains on the base data transform only.
    augment: false
    # Options: true enables AMP on CUDA; false uses full precision.
    use_amp: false
    # Options: 0 disables early stopping; positive values stop after this many
    # validation-loss checks without improvement.
    early_stop_patience: 0
    optimizer:
      # Options: "sgd", "local_sgd", "adam", "adamw".
      name: "sgd"
      lr: 0.002
      momentum: 0.0
      weight_decay: 0.0
    scheduler:
      # Options: "none", "cosine", "warmup_cosine", "plateau", "reduce_on_plateau".
      name: "none"
    criterion:
      # CrossEntropyLoss label_smoothing; range [0, 1).
      label_smoothing: 0.0

  tuned_imagenette:
    description: "Longer target-aligned MobileNetV2 surrogate fine-tuning run."
    num_epochs: 300
    batch_size: 64
    eval_batch_size: 512
    pretrained: true
    freeze_backbone: false
    augment: true
    use_amp: true
    early_stop_patience: 8
    optimizer:
      name: "sgd"
      lr: 0.004
      momentum: 0.9
      weight_decay: 0.00004
    scheduler:
      name: "warmup_cosine"
      warmup_epochs: 5
      min_lr: 0.00001
    criterion:
      label_smoothing: 0.0

  attacker_pool:
    description: "Legacy stronger attacker-pool recipe with frozen MobileNetV2 features and augmentation."
    num_epochs: 4
    batch_size: 64
    eval_batch_size: 512
    pretrained: true
    freeze_backbone: true
    augment: true
    use_amp: false
    early_stop_patience: 3
    optimizer:
      name: "adamw"
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      name: "cosine"
      min_lr: 0.00001
    criterion:
      label_smoothing: 0.0

model_config:
  kwargs:
    # Must match dataset_name. Imagenette uses 10 classes.
    num_classes: 10

algorithms:
  # Used only for surrogate client-shard defaults.
  FedAvg:
    fed_config:
      num_clients: 50
      batch_size: 64
    optim_config: {}
