data_config:
  dataset_path: "./Data/Imagenette"
  # Options: "Imagenette" is the supported Module 4 default. The loader can also
  # resolve many torchvision dataset names, but model_config.kwargs.num_classes
  # and transforms may need matching edits.
  dataset_name: "Imagenette"
  # Label-skew severity in [0, 1]. 0 = IID, 1 = very non-IID.
  non_iid_per: 0
  # Options: "attack_eval" for held-out attack evaluation, "selection" for the
  # checkpoint-selection split, "all" for the full validation set.
  eval_subset: "attack_eval"
  validation_split:
    enabled: true
    seed: 42
    # Must match the training configs. The first half is used for checkpoint
    # selection; the remainder is reserved for attacks.
    selection_fraction: 0.5

global_config:
  seed: 42
  # Options: "cuda", "cuda:0", "cpu". CUDA choices fall back to CPU if unavailable.
  device: "cuda"

artifacts:
  dir: "artifacts"
  config_snapshot: "module4_attack_config_used.json"
  target_metrics: "module4_target_training.json"
  target_checkpoint: "module4_v3_target.pt"
  baseline_metrics: "module4_federated_baseline.json"
  surrogate_metrics: "module4_surrogate.json"
  surrogate_checkpoint: "module4_surrogate.pt"
  surrogate_attack_metrics: "module4_surrogate_attacks.json"
  surrogate_attack_plot: "surrogate_attack_success_by_attack.png"
  transfer_metrics: "module4_transfer_results.json"
  federated_attack_metrics: "module4_federated_attacks.json"
  federated_attack_plot: "attack_accuracy.png"
  federated_attack_asr_plot: "global_target_label_asr.png"
  fraction_sweep_metrics: "module4_fraction_sweep.json"
  fraction_sweep_plot: "malicious_fraction_sweep.png"
  algorithm_comparison_metrics: "module4_algorithm_comparison.json"
  algorithm_comparison_plot: "algorithm_comparison.png"
  fast_validation_metrics: "module4_fast_validation.json"

attack_module:
  notebook: "attack_module.ipynb"
  # Algorithm used by the clean and attacked FL runs below.
  # Options: "FedAvg", "FedAdam", "FedAdagrad", "FedYogi", "Scaffold".
  selected_algorithm: "FedAvg"
  # Options: true or false. These toggles let you run only selected sections.
  run_surrogate_attacks: true
  run_transfer_attacks: true
  run_federated_poisoning: true
  # Options: true or false. The sweep reruns several selected-algorithm FL jobs and is slow.
  run_malicious_fraction_sweep: false
  # Options: true or false. Runs a tiny SyntheticSmoke wiring check for all algorithms.
  run_fast_validation: false
  # Options: true or false. Runs clean and attacked FL for each algorithm below.
  run_algorithm_comparison: false
  # Used only when run_algorithm_comparison is true. Keep data_config and attack
  # recipe fixed so only the FL algorithm changes where possible.
  algorithm_comparison_algorithms: ["FedAvg", "FedAdam", "FedAdagrad", "FedYogi", "Scaffold"]
  # Options: "pgd_default", "fgsm_default", or "random_noise".
  algorithm_comparison_attack_recipe: "pgd_default"
  # Used only when run_malicious_fraction_sweep is true. Values must be in [0, 1].
  malicious_fraction_grid: [0.0, 0.05, 0.1, 0.2]
  # Poison-generation dry run shown before FL starts.
  poison_demo_recipe: "pgd_default"
  poison_demo_batch_size: 8
  visualize_poison_demo: true

surrogate_training:
  notebook: "train_surrogate.ipynb"
  # Options: "centralized". The attack notebook loads the single saved
  # surrogate checkpoint produced by train_surrogate.ipynb.
  mode: "centralized"
  # Keep this aligned with train_surrogate_config.yaml for normal split runs.
  profile: "quick"
  # Options: "client_pool" or "full_train"; retained here for provenance and
  # for building malicious-client metadata.
  data_view: "client_pool"
  # Client shard used as the first surrogate data source when data_view=client_pool.
  client_id: 0
  # Number of client shards to pool when data_view=client_pool.
  pool_size: 4
  dataset_path: "./Data/Imagenette"
  # Options: keep aligned with data_config.dataset_name unless intentionally
  # training the surrogate on a different dataset.
  dataset_name: "Imagenette"
  # Label-skew severity in [0, 1]. Keep aligned with data_config.non_iid_per
  # unless intentionally changing the surrogate threat model.
  non_iid_per: 0

surrogate_training_profiles:
  quick:
    description: "Target-aligned MobileNetV2 surrogate smoke test over the configured attacker data view."
    num_epochs: 4
    batch_size: 64
    eval_batch_size: 512
    pretrained: true
    freeze_backbone: false
    augment: false
    use_amp: false
    early_stop_patience: 0
    optimizer:
      # Options: "sgd", "local_sgd", "adam", "adamw".
      name: "sgd"
      lr: 0.002
      momentum: 0.0
      weight_decay: 0.0
    scheduler:
      # Options: "none", "cosine", "warmup_cosine", "plateau", "reduce_on_plateau".
      name: "none"
    criterion:
      label_smoothing: 0.0

  tuned_imagenette:
    description: "Longer target-aligned MobileNetV2 surrogate fine-tuning run."
    num_epochs: 30
    batch_size: 256
    eval_batch_size: 512
    pretrained: true
    freeze_backbone: false
    augment: false
    use_amp: true
    early_stop_patience: 8
    optimizer:
      name: "sgd"
      lr: 0.004
      momentum: 0.9
      weight_decay: 0.00004
    scheduler:
      name: "warmup_cosine"
      warmup_epochs: 5
      min_lr: 0.00001
    criterion:
      label_smoothing: 0.0

  attacker_pool:
    description: "Legacy stronger attacker-pool recipe with frozen MobileNetV2 features and augmentation."
    num_epochs: 4
    batch_size: 64
    eval_batch_size: 512
    pretrained: true
    freeze_backbone: true
    augment: true
    use_amp: false
    early_stop_patience: 3
    optimizer:
      name: "adamw"
      lr: 0.001
      weight_decay: 0.0001
    scheduler:
      name: "cosine"
      min_lr: 0.00001
    criterion:
      label_smoothing: 0.0

model_config:
  module: "model"
  # Options for attack_module.ipynb target model loading: "MobileNetV3Transfer".
  name: "MobileNetV3Transfer"
  kwargs:
    # Ignored when attack_module loads the saved target checkpoint; kept for
    # compatibility with the shared model config shape.
    pretrained: true
    # Must match dataset_name. Imagenette uses 10 classes.
    num_classes: 10
    dropout: 0.1

algorithms:
  # Each algorithm exposes the same normal FL controls:
  # fraction_clients, num_clients, num_rounds, num_epochs, batch_size,
  # global_stepsize (server learning rate), local_stepsize, and criterion.
  FedAvg:
    fed_config:
      # Fraction of total clients sampled per FL round; range (0, 1].
      fraction_clients: 0.2
      num_clients: 50
      num_rounds: 12
      num_epochs: 3
      batch_size: 64
      global_stepsize: 1.0
      local_stepsize: 0.002
      # Options: fully qualified torch.nn loss path understood by the server.
      criterion: "torch.nn.CrossEntropyLoss"
    optim_config: {}

  FedAdam:
    fed_config:
      fraction_clients: 0.2
      num_clients: 50
      num_rounds: 12
      num_epochs: 3
      batch_size: 64
      global_stepsize: 0.1
      local_stepsize: 0.002
      criterion: "torch.nn.CrossEntropyLoss"
    optim_config:
      beta1: 0.9
      beta2: 0.99
      epsilon: 0.000001

  FedAdagrad:
    fed_config:
      fraction_clients: 0.2
      num_clients: 50
      num_rounds: 12
      num_epochs: 3
      batch_size: 64
      global_stepsize: 0.1
      local_stepsize: 0.002
      criterion: "torch.nn.CrossEntropyLoss"
    optim_config:
      epsilon: 0.000001

  FedYogi:
    fed_config:
      fraction_clients: 0.2
      num_clients: 50
      num_rounds: 12
      num_epochs: 3
      batch_size: 64
      global_stepsize: 0.1
      local_stepsize: 0.002
      criterion: "torch.nn.CrossEntropyLoss"
    optim_config:
      beta1: 0.9
      beta2: 0.99
      epsilon: 0.000001

  Scaffold:
    fed_config:
      fraction_clients: 0.2
      num_clients: 50
      num_rounds: 12
      num_epochs: 3
      batch_size: 64
      global_stepsize: 0.1
      local_stepsize: 0.002
      criterion: "torch.nn.CrossEntropyLoss"
    optim_config:
      c_init: 0.0

attack:
  seed: 42
  # Fraction of clients made malicious in attacked FL; range [0, 1].
  malicious_fraction: 0.1
  malicious_client_selection:
    # Options: "seeded_random", "first", "last", "all", "none", "explicit".
    mode: "seeded_random"
    # Optional deterministic override. Leave empty to use malicious_fraction.
    client_ids: []
  # First communication round where poisoning is active. Must not be after the final round.
  start_round: 3
  attack:
    # Options: "pgd", "fgsm", "random", "random_noise".
    type: "pgd"
    # Fraction of each malicious local batch selected for poisoning; range [0, 1].
    poison_rate: 0.2
    # Target class index; must be in [0, num_classes - 1].
    target_label: 0
    # Pixel-space L-infinity attack budget. Common values: 4/255=0.01568627,
    # 8/255=0.03137255.
    epsilon: 0.03137255
    # PGD/FGSM pixel-space step size. For PGD, keep <= epsilon.
    step_size: 0.00784314
    # Used by PGD only. FGSM uses one step; random noise ignores this.
    iters: 20
    # Options: fully qualified torch.nn loss path used by the malicious client.
    criterion: "torch.nn.CrossEntropyLoss"
    poison_rate_schedule:
      # Options: "linear". Remove poison_rate_schedule to use constant poison_rate.
      type: linear
      start: 0.05
      end: 0.2
  surrogate:
    # The attack notebook resolves this to artifacts.surrogate_checkpoint when
    # omitted or null. Keep explicit here so provenance includes the attacker's
    # intended surrogate checkpoint source.
    checkpoint: "artifacts/module4_surrogate.pt"
    checkpoint_source: "train_surrogate.ipynb"
    pretrained: false
    # Optional per-malicious-client surrogate fine-tuning before local poisoning.
    finetune_epochs: 0
    local_finetune_epochs: 0
    batch_size: 64
    learning_rate: 0.001
    weight_decay: 0.0
    freeze_backbone: false
    early_stop_patience: 0
